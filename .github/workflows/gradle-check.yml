name: Gradle Check (PoC)
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  gradle-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout OpenSearch repo (VULNERABLE: Checks out PR code)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup environment variables (PR)
        if: github.event_name == 'pull_request_target'
        run: |
          echo "event_name=pull_request_target" >> $GITHUB_ENV
          # [!] VULNERABILITY: Newline injection via jq raw-output into GITHUB_ENV
          echo "pr_title=$(jq --raw-output .pull_request.title $GITHUB_EVENT_PATH)" >> $GITHUB_ENV
          echo "pr_or_commit_description=$(jq --ascii-output .pull_request.body $GITHUB_EVENT_PATH)" >> $GITHUB_ENV

      - name: Trigger jenkins workflow (THE SINK)
        run: |
          # 真实的 workflow 这里是跑 bash opensearch-build/scripts/gradle/gradle-check.sh
          # 因为上一步污染了 BASH_ENV，所以在这个 run 步骤启动的瞬间，恶意脚本就会被先执行！
          echo "Running standard build steps..."
          echo "If you see the exploit message before this, RCE is successful."

      - name: Create Comment Success
        if: ${{ github.event_name == 'pull_request_target' && success() }}
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            :white_check_mark: Gradle check result for PR.
